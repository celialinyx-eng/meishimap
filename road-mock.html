<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杨浦高校 Citywalk 探店地图</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* 地图底色与网格 */
        .map-container {
            background-color: #f1f5f9;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* 模拟校区浮层 */
        .campus-label {
            position: absolute;
            font-weight: 900;
            color: rgba(203, 213, 225, 0.6);
            font-size: 3rem;
            pointer-events: none;
            text-transform: uppercase;
        }

        /* Marker 动画 */
        .marker-active { transform: scale(1.3); filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.5)); }
        
        .timeline-dot::before {
            content: '';
            position: absolute;
            left: -33px;
            top: 5px;
            width: 12px;
            height: 12px;
            background: #ef4444;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 0 2px #fee2e2;
        }

        /* Leaflet 容器必须有显式高度 */
        #leaflet-map { width: 100%; height: 100%; }
    </style>
</head>
<body class="bg-white overflow-hidden text-slate-800">

    <header class="h-16 border-b flex items-center justify-between px-8 bg-white z-50 relative">
        <div class="flex items-center gap-6">
            <button onclick="goBackHome()" class="p-2 hover:bg-slate-100 rounded-full transition-colors" title="返回首页" aria-label="返回首页">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-500 hover:text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
            </button>
            <h1 class="font-black text-2xl italic">CAMPUS WALK <span class="text-red-500 text-sm not-italic ml-2">杨浦版</span></h1>
            <nav class="flex bg-slate-100 p-1 rounded-xl">
                <button onclick="setRoute('deadline')" class="px-4 py-1.5 rounded-lg text-sm font-bold transition-all" id="btn-deadline">逃跑计划</button>
                <button onclick="setRoute('social')" class="px-4 py-1.5 rounded-lg text-sm font-bold transition-all" id="btn-social">跨校联谊</button>
                <button onclick="setRoute('old')" class="px-4 py-1.5 rounded-lg text-sm font-bold transition-all" id="btn-old">怀旧巡礼</button>
            </nav>
        </div>
        <div class="flex items-center gap-2 text-slate-400">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-xs font-bold">LIVE MAP DATA</span>
        </div>
    </header>

    <div class="flex h-[calc(100vh-64px)]">
        
        <aside class="w-[420px] h-full overflow-y-auto custom-scroll p-8 border-r shadow-2xl z-20 bg-white">
            <div id="route-meta" class="mb-10">
                </div>

            <div class="relative border-l-2 border-slate-100 ml-3 pl-8 space-y-12" id="timeline-list">
                </div>
        </aside>

        <main class="flex-1 relative map-container overflow-hidden">
            <!-- 轻量 mock 文字层，保留原来的“氛围感” -->
            <div class="campus-label top-20 left-20 z-[450]">FUDAN</div>
            <div class="campus-label bottom-20 right-20 z-[450]">SUFE</div>
            <div class="campus-label top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 rotate-12 opacity-30 text-8xl z-[450]">DAXUE ROAD</div>

            <div id="leaflet-map" class="absolute inset-0 z-[400]"></div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 右侧 Leaflet 地图
        let mapInstance = null;
        let routeMarkers = [];
        let routeLine = null;
        let schoolLayers = [];

        function goBackHome() {
            // `meishi-map.html` 默认显示首页（home-page），直接跳转即可
            window.location.href = './meishi-map.html';
        }

        function initLeafletIfNeeded() {
            if (mapInstance) return;
            mapInstance = L.map('leaflet-map', { zoomControl: true, attributionControl: false });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(mapInstance);

            // 标注四所高校（参考 meishi-map.html 的实现）
            const schoolData = [
                { name: "复旦大学", pos: [31.2974, 121.5036], color: '#003d7c' },
                { name: "上海财经大学", pos: [31.3066, 121.4940], color: '#be123c' },
                { name: "同济大学", pos: [31.2831, 121.5008], color: '#15803d' },
                { name: "上海体育大学", pos: [31.3127, 121.5242], color: '#7e22ce' }
            ];

            schoolLayers = schoolData.flatMap(s => {
                const circle = L.circle(s.pos, {
                    color: s.color,
                    fillColor: s.color,
                    fillOpacity: 0.15,
                    weight: 2,
                    radius: 500
                }).addTo(mapInstance);

                const estimatedWidth = s.name.length * 13 + 28;
                const estimatedHeight = 32;
                const label = L.marker(s.pos, {
                    interactive: false,
                    icon: L.divIcon({
                        className: 'school-label',
                        html: `<div style="
                            background-color: ${s.color};
                            color: white;
                            padding: 6px 14px;
                            border-radius: 20px;
                            font-weight: bold;
                            font-size: 13px;
                            white-space: nowrap;
                            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
                            border: 2px solid white;
                            text-align: center;
                            font-family: 'PingFang SC', sans-serif;
                            pointer-events: none;
                            line-height: 1.2;
                        ">${s.name}</div>`,
                        iconSize: [estimatedWidth, estimatedHeight],
                        iconAnchor: [estimatedWidth / 2, estimatedHeight / 2]
                    })
                }).addTo(mapInstance);

                return [circle, label];
            });
        }

        function clearRouteLayers() {
            routeMarkers.forEach(m => m.remove());
            routeMarkers = [];
            if (routeLine) {
                routeLine.remove();
                routeLine = null;
            }
        }

        function renderRouteOnMap(points) {
            initLeafletIfNeeded();
            clearRouteLayers();

            // marker icon：用 DivIcon 做编号圆点
            const markers = points.map((p, i) => {
                const icon = L.divIcon({
                    className: '',
                    html: `
                        <div style="
                            width: 34px; height: 34px;
                            background:#ef4444; color:white;
                            border-radius:999px;
                            border:4px solid white;
                            display:flex; align-items:center; justify-content:center;
                            font-weight:900;
                            box-shadow:0 10px 25px rgba(239,68,68,.25);
                        ">${i + 1}</div>
                    `,
                    iconSize: [34, 34],
                    iconAnchor: [17, 17],
                    popupAnchor: [0, -16]
                });

                const marker = L.marker([p.lat, p.lng], { icon }).addTo(mapInstance);
                marker.bindPopup(`
                    <div style="min-width:180px">
                        <div style="font-weight:900;color:#ef4444;margin-bottom:2px">${i + 1}. ${p.name}</div>
                        <div style="font-size:12px;color:#64748b">${p.tag} · ${p.info}</div>
                    </div>
                `);
                return marker;
            });

            routeMarkers = markers;

            const latlngs = points.map(p => [p.lat, p.lng]);
            routeLine = L.polyline(latlngs, {
                color: '#f87171',
                weight: 4,
                opacity: 0.95,
                dashArray: '10 8'
            }).addTo(mapInstance);

            const bounds = L.latLngBounds(latlngs);
            mapInstance.fitBounds(bounds.pad(0.25));
        }

        function highlightMarker(index) {
            const marker = routeMarkers[index];
            if (!marker) return;
            marker.openPopup();
            mapInstance?.panTo(marker.getLatLng(), { animate: true, duration: 0.35 });
        }

        function resetMarkers() {
            mapInstance?.closePopup();
        }

        const routeConfig = {
            deadline: {
                title: "Deadline 逃跑计划",
                desc: "财大学子的自救路线，从图书馆到大学路，暂时告别综述。",
                points: [
                    { name: "财大图书馆", lat: 31.3066, lng: 121.4940, tag: "起点", info: "收拾心情出发" },
                    { name: "武川路拌面", lat: 31.3049, lng: 121.4970, tag: "补给", info: "碳水是抗压的核心" },
                    { name: "大学路露台咖啡", lat: 31.3038, lng: 121.5095, tag: "发呆", info: "看落日消失在街角" }
                ]
            },
            social: {
                title: "跨校联谊路",
                desc: "复旦 x 财大官配路线。好逛、好拍、不尴尬。",
                points: [
                    { name: "复旦正门", lat: 31.2974, lng: 121.5036, tag: "集合", info: "标志性地点集合" },
                    { name: "大学路西餐吧", lat: 31.3040, lng: 121.5088, tag: "晚餐", info: "环境优雅，适合破冰" },
                    { name: "政通路甜品店", lat: 31.3025, lng: 121.5120, tag: "后续", info: "财大人的私藏好店" },
                    { name: "财大校门", lat: 31.3066, lng: 121.4940, tag: "散步", info: "最后一段安静的路" }
                ]
            },
            old: {
                title: "怀旧苍蝇馆子巡礼",
                desc: "同济与体院的烟火气，寻找十年前的物价。",
                points: [
                    { name: "赤峰路煎饼摊", lat: 31.2831, lng: 121.5008, tag: "早餐", info: "同济人的晨间记忆" },
                    { name: "体院后街大排档", lat: 31.3127, lng: 121.5242, tag: "硬核", info: "感受肉食者的快乐" },
                    { name: "五角场老弄堂", lat: 31.3005, lng: 121.5134, tag: "探秘", info: "杨浦最后的烟火气" }
                ]
            }
        };

        function setRoute(key) {
            const data = routeConfig[key];
            
            // 1. 切换按钮状态
            document.querySelectorAll('nav button').forEach(b => b.className = "px-4 py-1.5 rounded-lg text-sm font-bold text-slate-500 hover:text-slate-800 transition-all");
            document.getElementById(`btn-${key}`).className = "px-4 py-1.5 rounded-lg text-sm font-bold bg-white text-red-500 shadow-sm";

            // 2. 渲染左侧
            document.getElementById('route-meta').innerHTML = `
                <h2 class="text-3xl font-black mb-2">${data.title}</h2>
                <p class="text-slate-400 text-sm leading-relaxed">${data.desc}</p>
            `;
            
            document.getElementById('timeline-list').innerHTML = data.points.map((p, i) => `
                <div class="timeline-dot relative group cursor-pointer" onmouseenter="highlightMarker(${i})" onmouseleave="resetMarkers()">
                    <span class="text-[10px] font-black text-red-400 uppercase tracking-widest block mb-1">${p.tag}</span>
                    <h3 class="font-bold text-lg group-hover:text-red-500 transition-colors">${p.name}</h3>
                    <p class="text-sm text-slate-400 mt-1">${p.info}</p>
                </div>
            `).join('');

            // 3. 渲染右侧 Leaflet 路线（mock 经纬度）
            renderRouteOnMap(data.points);
        }

        // 初始化加载逃跑计划
        window.onload = () => setRoute('deadline');
    </script>
</body>
</html>
